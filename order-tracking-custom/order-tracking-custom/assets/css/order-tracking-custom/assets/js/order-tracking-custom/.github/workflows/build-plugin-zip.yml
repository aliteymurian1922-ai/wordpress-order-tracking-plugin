name: Build Plugin ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create installable plugin ZIP
        run: |
          rm -f order-tracking-custom.zip
          zip -r order-tracking-custom.zip order-tracking-custom \
            -x "*.git*" \
            -x "*/.DS_Store" \
            -x "*/node_modules/*"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-tracking-custom-installable
          path: order-tracking-custom.zip

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: order-tracking-custom.zip
